# LWD Online RL Post-Training Configuration
# Stage 2: Continuous online training with fleet data collection

# Model dimensions
state_dim: 896
action_dim: 14
action_horizon: 30
action_hidden_size: 896

# DIVL
num_atoms: 201
v_min: -0.1
v_max: 1.1
gamma: 0.9999
ema_rate: 0.005
tau_base_offline: 0.6
tau_base_online: 0.9      # More optimistic in online stage
alpha: 0.3
tau_min: 0.4
tau_max: 0.9

# QAM
qam_temperature: 2.0
qam_num_quadrature: 4
num_flow_steps: 10

# Training
policy_lr: 0.00002
value_lr: 0.0005
batch_size: 256
online_steps: 5000
n_steps_offline_long: 10
n_steps_offline_short: 1
actor_sync_period: 50     # Publish policy every 50 learner steps

# Replay buffer
max_offline_size: 1000000
max_online_size: 100000
online_ratio: 0.5         # 1:1 offline:online ratio

# Flow matching
beta_alpha: 1.5
beta_beta: 1.0
flow_s: 0.999

# Checkpointing
save_path: "./checkpoints/online"
save_interval: 1000
log_interval: 10

# Distributed
episode_input_dir: "./episodes"
policy_checkpoint_dir: "./policy_checkpoints"
num_actors: 16
